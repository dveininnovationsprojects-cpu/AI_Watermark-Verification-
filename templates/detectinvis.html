<!DOCTYPE html>
<html class="h-full bg-slate-50" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Invisible Watermark Detection</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
body{font-family:'Inter',sans-serif}
</style>
</head>

<body class="h-full overflow-hidden">

<div class="flex h-full">

<!-- MAIN -->
<main class="flex-1 flex flex-col min-w-0 overflow-hidden">

<!-- HEADER -->
<header class="bg-[#1f3c88] text-white px-6 py-3 flex items-center justify-between">
<h1 class="text-xl font-bold uppercase tracking-wide">
Invisible Watermark Detection System
</h1>

<!-- Home Button (Right Side) -->
<a href="/all/{{username}}" class="flex items-center justify-center w-10 h-10 rounded-lg hover:bg-white/10 text-white transition">
<span class="material-symbols-outlined text-2xl text-white"></span>
</a>

</header>

<div class="flex-1 overflow-y-auto p-8 bg-slate-50">
<div class="max-w-3xl mx-auto space-y-8">

<section class="bg-white rounded-xl shadow-sm border overflow-hidden">
<div class="p-6 border-b bg-slate-50/50">
<h2 class="text-lg font-semibold">
Detect Invisible Data from Image
</h2>
</div>

<div class="p-6">
<form action="/search/{{username}}" method="POST" enctype="multipart/form-data" class="space-y-4" id="form-detect">

<input type="file" name="image" class="block w-full border rounded p-2"
onchange="previewImage(this,'analyzer-preview')" required>

<img id="analyzer-preview" class="hidden rounded"/>

<input type="password" name="key" placeholder="Enter Secret Key"
class="block w-full border rounded p-2" required>

<button class="w-full bg-[#1f3c88] text-white py-2 rounded">
Detect Invisible Watermark
</button>

</form>

<div id="analysis-result"
class="hidden mt-4 bg-black text-green-400 text-xs p-4 rounded whitespace-pre-wrap"></div>
</div>
</section>

</div>
</div>
</main>
</div>

<script>
const username="{{username}}";

function previewImage(input,id){
const img=document.getElementById(id);
const r=new FileReader();
r.onload=e=>{
img.src=e.target.result;
img.classList.remove('hidden')
};
r.readAsDataURL(input.files[0])
}

formDetect=document.getElementById('form-detect');
formDetect.onsubmit=async e=>{
e.preventDefault();
let res=await fetch(`/search/${username}`,{
method:'POST',
body:new FormData(formDetect)
});
let j=await res.json();
let box=document.getElementById('analysis-result');
box.classList.remove('hidden');
box.textContent=JSON.stringify(j,null,2)
}
</script>

</body>
</html>
