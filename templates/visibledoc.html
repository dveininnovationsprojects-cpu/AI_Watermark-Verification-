FOR DOCUMENTS
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Watermark Studio</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:Poppins;
background:linear-gradient(135deg,#1e293b,#0f172a);
}

.glass{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(16px);
border:1px solid rgba(255,255,255,0.15);
}

.drop-area{
border:2px dashed rgba(255,255,255,0.3);
}

.drop-area.dragover{
border-color:#6366f1;
background:rgba(99,102,241,0.1);
}

</style>

</head>

<body class="text-white min-h-screen p-6">

<!-- HEADER -->

<div class="flex justify-between items-center mb-6">

<h1 class="text-2xl font-semibold">Watermark Studio</h1>

<a href="/indx/{{username}}" class="glass px-4 py-2 rounded-lg hover:bg-white/20 transition">
dashboard
</a>

</div>


<form action="/adddoc/{{username}}" method="POST" enctype="multipart/form-data">

<div class="grid lg:grid-cols-2 gap-6">

<!-- UPLOAD CARD -->

<div class="glass rounded-2xl p-6 shadow-xl">

<h2 class="text-lg font-semibold mb-4">Upload File</h2>

<div id="dropArea" class="drop-area rounded-xl p-10 text-center cursor-pointer">

<p class="text-gray-300 mb-2">Drag & Drop your file</p>
<p class="text-sm text-gray-400">or click to browse</p>

<input id="fileInput" type="file" name="files" class="hidden" required>

</div>

</div>


<!-- WATERMARK SETTINGS -->

<div class="glass rounded-2xl p-6 shadow-xl">

<h2 class="text-lg font-semibold mb-4">Watermark Settings</h2>

<div class="grid gap-4">

<input id="textInput" name="text" type="text" placeholder="Watermark Text"
class="bg-white/10 border border-white/20 rounded-lg p-2">

<select name="position" id="position"
class="bg-white/10 border border-white/20 rounded-lg p-2">

<option value="center">Center</option>
<option value="center-left">Center Left</option>
<option value="center-right">Center Right</option>
<option value="center-bottom">Center Bottom</option>
<option value="top">Top</option>

</select>

<select name="font"
class="bg-white/10 border border-white/20 rounded-lg p-2">

<option value="ARIAL.TTF">Arial</option>
<option value="ARIALBD.TTF">Arial Bold</option>
<option value="BAHNSCHRIFT.TTF">Bahnschrift</option>
<option value="FRAMD.TTF">Framd</option>
<option value="NIRMALA.TTC">Nirmala</option>

</select>

<select name="opacity"
class="bg-white/10 border border-white/20 rounded-lg p-2">

<option value="bold">Bold</option>
<option value="transparent">Transparent</option>
<option value="invisible">Invisible</option>

</select>

<select name="size" id="size"
class="bg-white/10 border border-white/20 rounded-lg p-2">

<option value="small">Small</option>
<option value="medium">Medium</option>
<option value="large">Large</option>

</select>

<button
class="mt-4 bg-indigo-600 hover:bg-indigo-700 rounded-lg py-3 font-semibold transition">

Process & Download

</button>

</div>

</div>


<!-- LIVE PREVIEW -->

<div class="glass rounded-2xl p-6 shadow-xl lg:col-span-2">

<h2 class="text-lg font-semibold mb-4">Live Preview</h2>

<div class="flex justify-center">

<div class="relative">

<img id="previewImage"
class="rounded-xl max-h-[400px] shadow-lg">

<div id="watermarkPreview"
class="absolute text-white opacity-60 pointer-events-none">

Sample

</div>

</div>

</div>

</div>

</div>

</form>


<script>

const dropArea = document.getElementById("dropArea")
const fileInput = document.getElementById("fileInput")
const previewImage = document.getElementById("previewImage")

dropArea.onclick = () => fileInput.click()

fileInput.onchange = e => {

const file = e.target.files[0]
const reader = new FileReader()

reader.onload = () => {
previewImage.src = reader.result
}

reader.readAsDataURL(file)

}

dropArea.addEventListener("dragover",e=>{
e.preventDefault()
dropArea.classList.add("dragover")
})

dropArea.addEventListener("dragleave",()=>{
dropArea.classList.remove("dragover")
})

dropArea.addEventListener("drop",e=>{

e.preventDefault()

fileInput.files = e.dataTransfer.files

const reader = new FileReader()

reader.onload = () =>{
previewImage.src = reader.result
}

reader.readAsDataURL(e.dataTransfer.files[0])

})


const textInput = document.getElementById("textInput")
const watermarkPreview = document.getElementById("watermarkPreview")

textInput.addEventListener("input",()=>{
watermarkPreview.innerText = textInput.value
})


</script>

</body>
</html>
